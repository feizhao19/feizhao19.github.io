{% assign p = include.project %}

<div class="viz-project viz-project--geo-agent" id="project-{{ p.id }}" data-project-id="{{ p.id }}">
  {% include viz-project-title.html project=p number=include.number %}
  {% if p.description %}
  <div class="viz-project__description">{{ p.description | markdownify }}</div>
  {% endif %}

  <div class="viz-project__demo-wrap">
    <div class="viz-project__figure">
      <figure class="geo-agent-preview">
        {% if p.youtube_id %}
        <div
          class="geo-agent-preview__trigger js-geo-agent-open"
          role="button"
          tabindex="0"
          data-youtube-id="{{ p.youtube_id }}"
          data-modal-id="geo-agent-modal-{{ p.id }}"
          aria-label="Play RapidResponseAgent demo video"
        >
          <span class="geo-agent-preview__media">
            <img
              class="geo-agent-preview__img"
              src="{{ '/images/Agent_project.png' | prepend: site.baseurl }}"
              alt="RapidResponseAgent dashboard showing a post-disaster damage map, assessment statistics, and a conversational AI interface for rapid disaster response"
              loading="lazy"
              decoding="async"
            >
            <span class="geo-agent-preview__overlay" aria-hidden="true">
              <span class="geo-agent-preview__play-icon">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor" aria-hidden="true">
                  <path d="M8 5v14l11-7z"></path>
                </svg>
              </span>
              <span class="geo-agent-preview__play-label">Play demo</span>
            </span>
          </span>
        </div>
        {% else %}
        <a
          class="geo-agent-preview__link js-paper-image-lightbox js-paper-image-lightbox--xxlarge"
          href="{{ '/images/Agent_project.png' | prepend: site.baseurl }}"
          aria-label="View larger RapidResponseAgent dashboard screenshot"
        >
          <img
            class="geo-agent-preview__img"
            src="{{ '/images/Agent_project.png' | prepend: site.baseurl }}"
            alt="RapidResponseAgent dashboard showing a post-disaster damage map, assessment statistics, and a conversational AI interface for rapid disaster response"
            loading="lazy"
            decoding="async"
          >
        </a>
        {% endif %}
        {% if p.preview_caption %}
        <figcaption class="geo-agent-preview__caption">{{ p.preview_caption | markdownify }}</figcaption>
        {% endif %}
      </figure>
    </div>
  </div>
</div>

{% if p.youtube_id %}
<div
  class="demo-modal js-geo-agent-modal"
  id="geo-agent-modal-{{ p.id }}"
  role="dialog"
  aria-modal="true"
  aria-label="RapidResponseAgent demo video"
  aria-hidden="true"
  hidden
  data-aspect-ratio="{{ p.youtube_aspect_ratio | default: '1920/954' }}"
>
  <div class="demo-modal__backdrop js-geo-agent-close" aria-hidden="true"></div>
  <button type="button" class="demo-modal__close js-geo-agent-close" aria-label="Close demo">&times;</button>
  <div class="demo-modal__content demo-modal__content--geo-agent">
    <p class="demo-modal__hint">Press Escape or click the background to close</p>
    <div
      class="geo-agent-modal__video-wrap js-geo-agent-video-wrap"
      style="--geo-agent-video-aspect: {{ p.youtube_aspect_ratio | default: '1920/954' }};"
    >
      <iframe
        class="geo-agent-modal__video js-geo-agent-iframe"
        title="RapidResponseAgent demo walkthrough"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
      ></iframe>
    </div>
  </div>
</div>
<script src="{{ '/libs/custom/demos/geo-agent.js' | prepend: site.baseurl }}" defer fetchpriority="low"></script>
{% endif %}
