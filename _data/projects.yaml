projects:
  - id: vlm-hallucination
    type: vlm-hallucination
    title: "Selected Project 1: VisionGuard — RL-based Agentic Self-Correction for Vision-Language Models"
    description: >-
      Interactive demo of **VisionGuard** ([GitHub](https://github.com/feizhao19/VisionGuard), [paper](https://arxiv.org/abs/2505.03420), [PDF](/files/RL4VLM.pdf)):
      an inference-time agentic loop where the **Generator** (VLM) proposes beam-search candidates,
      the **Critic** (custom CLIP) scores **SAS** + **NHP**, and the **Self-Corrector** applies RL-TTA on LayerNorm γ
      (~0.003% of parameters, episodic per image) before re-generating a grounded caption.
      Reduces CHAIR by **15.4%** (LLaVA-7B) and **17.3%** (InstructBLIP) on AMBER.
      Switch samples and run the closed loop.

  - id: building-damage
    title: "Selected Project 2: Visual Prompt Learning of Foundation Models for Damage Evaluation"
    description: >-
      Below is an interactive showcase of my work ViPDE ([Github](https://github.com/feizhao19/RapidDamageAssessment)) on post-disaster building damage assessment, applicable to 11 different types of natural disasters. Drag the slider to compare pre- and post-disaster imagery (top) with the predicted damage map (bottom). Use the buttons to switch between sample communities.
    samples:
      - id: potero
        label: Potero
        caption: >-
          **Potero Canyon, Pacific Palisades, LA, CA** (~106 acres; [George Wolfberg Park at Potero Canyon, Alma Real Dr](https://www.google.com/maps/search/?api=1&query=George+Wolfberg+Park+at+Potero+Canyon,+Alma+Real+Dr,+Pacific+Palisades,+CA+90272)). Imagery from [NOAA ERI California Fire (2025)](https://storms.ngs.noaa.gov/).
        pre_image: Potero_LA_pre_disaster.png
        post_image: Potero_LA_post_disaster.png
        result_image: Potero_pre_damage_overlay_legend.png
      - id: marquez
        label: Marquez
        caption: >-
          **Marquez Knolls, Pacific Palisades, LA, CA** (~175 acres; [17080 Sunset Blvd](https://www.google.com/maps/search/?api=1&query=17080+Sunset+Blvd,+Pacific+Palisades,+CA+90272)). Imagery from [NOAA ERI California Fire (2025)](https://storms.ngs.noaa.gov/).
        pre_image: Marquez_LA_pre_disaster.png
        post_image: Marquez_LA_post_disaster.png
        result_image: Marquez_post_damage_overlay.png
    top_left_label: Pre-disaster
    top_right_label: Post-disaster
    bottom_left_label: Pre-disaster
    bottom_right_label: Damage assessment

  - id: attitude-fusion
    type: attitude-fusion
    title: "Selected Project 3: Multimodal sensor fusion and calibration for attitude state estimation"
    description: >-
      Combines gyroscope, accelerometer, and magnetometer measurements for real-time vehicle attitude estimation, enabling accurate trajectory estimation while mitigating long-term drift.
