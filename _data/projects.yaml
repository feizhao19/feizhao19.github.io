  - id: rapid-response-agent
    anchor: RapidResponseAgent
    legacy_ids:
      - project-geo-agent
    type: geo-agent
    title: "Multimodal AI Agent"
    youtube_id: lIQxRoqIp14
    youtube_aspect_ratio: "1920/954"
    description: >-
      <span class="viz-project__lead">RapidResponseAgent ([GitHub](https://github.com/feizhao19/RapidResponseAgent))</span>
      An agentic runtime for post-disaster assessment that provides an artifact-centric orchestration stack for heterogeneous agent workloads. The runtime coordinates **GPU-heavy visual perception** ([GitHub](https://github.com/feizhao19/RapidDamageAssessment)), **VLM-based (e.g., LLaMA)** discrepancy **verification and reasoning** over uncertain assessments, structured damage analytics, facilities lookup, and locally deployed RAG+LLM reasoning through persistent session memory, episodic tool traces, and manifest-driven checkpoints, keeping sensitive disaster imagery and assessment data on-premises. It decouples heavy inference from lightweight follow-up analysis, enabling reliable multi-turn Q&amp;A over cached assessment artifacts and on-demand decision-ready reports.
    preview_caption: "Demo walkthrough of the RapidResponseAgent dashboard."

  - id: attitude-fusion
    type: attitude-fusion
    title: "Vehicle State and Trajectory Estimation"
    description: >-
      <span class="viz-project__lead">Multimodal sensor fusion and calibration for attitude state estimation:</span>
      Combines gyroscope, accelerometer, and magnetometer measurements for real-time vehicle attitude estimation, enabling accurate trajectory estimation while mitigating long-term drift.
