projects:
  - id: vlm-hallucination
    type: vlm-hallucination
    title: "Multimodal Large Language Models & Reinforcement Learning"
    description: >-
      *Test-Time Alignment for Cross-Modal Generation and Vision-Language Models:*
      An inference-time alignment framework, addressing one of the fundamental challenges in cross-modal generation.
      Proposed in 2024, our work ([GitHub](https://github.com/feizhao19/VisionGuard)) introduces a relationship-based optimization strategy for lightweight reinforcement learning, optimizing candidate responses by their relative quality rather than absolute reward values.
      This progressively improves cross-modal alignment, strengthens visual grounding, and enables more reliable generation without model retraining.

  - id: building-damage
    title: "Computer Vision & Contrastive Representation Learning"
    description: >-
      *Visual Prompt Learning of Foundation Models for Damage Evaluation:*
      Below is an interactive showcase of my work ViPDE ([Github](https://github.com/feizhao19/RapidDamageAssessment)) on post-disaster building damage assessment, applicable to 11 different types of natural disasters. Drag the slider to compare pre- and post-disaster imagery (top) with the predicted damage map (bottom). Use the buttons to switch between sample communities.
    samples:
      - id: potero
        label: Potero
        caption: >-
          **Potero Canyon, Pacific Palisades, LA, CA** (~106 acres; [George Wolfberg Park at Potero Canyon, Alma Real Dr](https://www.google.com/maps/search/?api=1&query=George+Wolfberg+Park+at+Potero+Canyon,+Alma+Real+Dr,+Pacific+Palisades,+CA+90272)). Imagery from [NOAA ERI California Fire (2025)](https://storms.ngs.noaa.gov/).
        pre_image: Potero_LA_pre_disaster.png
