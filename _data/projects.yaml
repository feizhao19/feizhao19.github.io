projects:
  - id: vlm-hallucination
    type: vlm-hallucination
    title: "Multimodal Large Language Models & Reinforcement Learning"
    description: >-
      <span class="viz-project__lead">Test-Time Traning (TTT) for Cross-Modal Generation and Vision-Language Models:</span>
      An inference-time training framework designed to **address data distribution shift** in cross-modal generation.
      Proposed in 2024, our work [GitHub](https://github.com/feizhao19/VisionGuard)) introduced a relationship-based optimization strategy that optimizes candidate responses by their relative quality rather than absolute reward values, preceding the widespread adoption of similar relative-ranking reinforcement learning methods (e.g., GRPO).
      This progressively improves cross-modal alignment, strengthens visual grounding, and enables more reliable generation without model retraining.

  - id: building-damage
    anchor: RapidDamageAssessment
    legacy_ids:
      - project-building-damage
    title: "Computer Vision & Contrastive Representation Learning"
    description: >-
      <span class="viz-project__lead">Visual Prompt Learning of Foundation Models for Damage Evaluation:</span>
      Given paired pre- and post-disaster imagery, we adapt **Meta's Segment Anything Model (SAM)** using **soft prompt tuning** to learn contrastive representations for building damage assessment. The inference pipeline is cross-platform **optimized for heterogeneous GPU architectures (NVIDIA CUDA / Apple MPS)**.
      Below is an interactive showcase of our work ViPDE ([GitHub](https://github.com/feizhao19/RapidDamageAssessment)), supporting 11 types of natural disasters. Drag the slider to compare pre- and post-disaster imagery (top) with the predicted damage map (bottom). Use the buttons to switch between sample communities.
