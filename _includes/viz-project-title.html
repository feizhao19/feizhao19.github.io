{% assign p = include.project %}
{% if p.anchor %}
{% assign project_anchor = p.anchor %}
{% else %}
{% assign project_anchor = 'project-' | append: p.id %}
{% endif %}
<h5 class="viz-project__title">
  <a class="viz-project__permalink" href="#{{ project_anchor }}" aria-label="Permalink to project {{ include.number }}">#{{ include.number }}</a>
  {{ p.title }}
</h5>
